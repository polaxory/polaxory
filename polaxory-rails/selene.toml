# Selene static analysis config for polaxory-rails.
# Selene catches what the type system can't: unused variables, shadowing, suspicious patterns.
# Configured for Roblox / Luau as of 2026.

std = "roblox"

# Strict by default. Loosen specific lints only with explicit operator decision.
[lints]
# Shadowing is a frequent source of bugs in Luau — keep this strict.
shadowing = "warn"

# Unused variables: warn (not error) — sometimes you keep them for symmetry.
unused_variable = "warn"

# Empty if/while/for bodies are almost always bugs.
empty_if = "warn"

# Roblox-specific
roblox_incorrect_color3_new_bounds = "warn"
roblox_suspicious_udim2_new = "warn"

# We use type annotations heavily; if-then-else with missing branches is a real bug.
if_same_then_else = "warn"

# Loops without break/return that look infinite — keep this on.
multiple_statements = "warn"
