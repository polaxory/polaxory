name: Polaxory CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: polaxory-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  luau-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
      - name: Install tools
        run: aftman install
      - name: Format check
        run: stylua --check src
      - name: Lint
        run: selene src
      - name: Run Luau spec
        run: lune run tests/factory_slice_0.spec.luau
      - name: Run purchase receipt rail spec
        run: lune run tests/purchase_receipt_rail.spec.luau
      - name: Rojo build
        run: rojo build default.project.json --output build.rbxlx
